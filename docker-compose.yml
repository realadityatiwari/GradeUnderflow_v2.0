version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gradeunderflow_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-gradeunderflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gradeunderflow_network

volumes:
  postgres_data:

networks:
  gradeunderflow_network:
    driver: bridge
